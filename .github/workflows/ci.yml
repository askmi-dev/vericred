name: VeriCred CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  audit-and-test:
    name: Test & Validate Gateway
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Use Node.js 22.x
      uses: actions/setup-node@v4
      with:
        node-version: 22.x
        cache: 'npm'

    - name: Install Dependencies
      run: |
        npm ci
        npm --prefix stitch-out ci

    - name: Run Security Vulnerability Audit
      run: npm audit --audit-level=high --omit=dev || true

    - name: Execute 132 Cryptographic & Architecture Tests
      run: npm test

    - name: Validate Production Build Compilation
      run: npm run build

  docker-dry-run:
    name: Test Container Build Integrity
    needs: audit-and-test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Local Image Test (No Push)
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: vericred/gateway:test
        cache-from: type=gha
        cache-to: type=gha,mode=max
