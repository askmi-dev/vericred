[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "node dist/server.js"
healthcheckPath = "/.well-known/openid-credential-issuer"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[mounts]]
# Railway Volume — persists secrets.json and holders.json across redeploys.
# Create the volume in the Railway dashboard and mount it here.
# Railway sets the mount path as an env var; we reference it via DATA_DIR.
mountPath = "/data"

[variables]
# Set these in the Railway dashboard → Variables tab.
# Do NOT commit real values here.
DATA_DIR             = "/data"
PORT                 = "3100"
# ISSUER_URL         = "https://your-app.up.railway.app"   ← set this in dashboard
# DEMO_MODE          = "true"                               ← remove for production
# ADMIN_API_KEY      = ""   ← optional: set to pre-provision the admin key
# PSEUDO_SECRET      = ""   ← optional: must be set together with ADMIN_API_KEY
